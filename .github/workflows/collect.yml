# 周中报采集流水线（bot 通道）
# 定时在 P10 上线阶段才启用，当前只留手动触发（workflow_dispatch）验证
name: Collect midweek

on:
  workflow_dispatch:
  # P10 上线时取消注释（UTC 0:00 周二/周五 = 北京时间早 8 点，见设计纪要第 4 节）：
  # schedule:
  #   - cron: "0 0 * * 2,5"

jobs:
  midweek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # bot 通道的关键：deploy key 在 main ruleset 的 bypass 名单里，
          # 用它 push 报告可绕过「必须 PR」；代码通道不受影响
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 安装依赖
        run: uv sync

      - name: 运行周中报流水线
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          # GitHub 采集器带 token 防共享 runner 出口 IP 的限流
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # LangSmith 可观测（P5）：secret 未配置时表达式为 false → 客户端不启用，无害
          LANGSMITH_TRACING: ${{ secrets.LANGSMITH_API_KEY != '' }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: ai-radar
          # flash 牌价（仓库 Variables 配置，非密钥）：配置后尾注成本从上限估变实测值
          ARK_PRICE_IN_FLASH: ${{ vars.ARK_PRICE_IN_FLASH }}
          ARK_PRICE_OUT_FLASH: ${{ vars.ARK_PRICE_OUT_FLASH }}
        run: uv run python -m src.pipeline.midweek

      - name: 提交报告与状态（bot 直推 main）
        run: |
          git config user.name "ai-radar-bot"
          git config user.email "ai-radar-bot@users.noreply.github.com"
          git add reports/ data/ assets/
          # 没有新内容（全部源无更新）时安静退出，不留空 commit
          git diff --cached --quiet && echo "本期无新内容" && exit 0
          git commit -m "[bot] 周中报 $(date -u +%F)"
          git push
