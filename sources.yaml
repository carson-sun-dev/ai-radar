# 信息源配置（设计纪要第四节定案：10 家机构 + arXiv 论文通道）
# 加源 = 加一段；collector 决定用哪个采集器，字段要求见 src/config.py
# web 类源的具体 URL 在 P2 实现采集器时逐一实测校准（页面结构可能变化）

defaults:
  timeout_seconds: 30
  max_retries: 3
  backoff_base_seconds: 5
  backoff_factor: 3 # 重试间隔 5s → 15s → 45s

# 时效窗口：超过 30 天的条目不进打分池（防首轮/新加源时存量旧闻霸榜）
max_age_days: 30

sources:
  # ============ 国际 ============
  - id: openai-news
    org: OpenAI
    collector: rss
    url: https://openai.com/news/rss.xml

  # via_jina：直抓虽 200 但标题是嵌套元素拼接的垃圾（2026-07 实测），Jina 的干净且带日期
  - id: anthropic-news
    org: Anthropic
    collector: web
    url: https://www.anthropic.com/news
    link_prefix: https://www.anthropic.com/news/
    via_jina: true

  # engineering blog 单独成源：对应用岗价值最高的一路，不与产品新闻混排
  - id: anthropic-engineering
    org: Anthropic
    collector: web
    url: https://www.anthropic.com/engineering
    link_prefix: https://www.anthropic.com/engineering/
    via_jina: true

  - id: deepmind-blog
    org: Google DeepMind
    collector: rss
    url: https://deepmind.google/blog/rss.xml

  - id: hf-blog
    org: Hugging Face
    collector: rss
    url: https://huggingface.co/blog/feed.xml

  # Daily Papers 双重角色：论文来源 + 打分信号（上榜 = 人工精选背书）
  - id: hf-daily-papers
    org: Hugging Face
    collector: hf_papers
    url: https://huggingface.co/api/daily_papers
    max_items: 30

  # langchain-blog 暂下线：Ghost 博客（blog.langchain.dev）已迁入 www.langchain.com/blog
  # 且不再提供 RSS，列表页纯 JS 卡片连 Jina 都提不到链接（2026-07 实测）。
  # 版本动态由 langgraph-releases 兜底，工程内容暂靠 HF blog / Anthropic engineering 补位。

  - id: langgraph-releases
    org: LangChain
    collector: github
    repo: langchain-ai/langgraph

  # ============ 国内 ============
  - id: deepseek-github
    org: DeepSeek
    collector: github
    github_org: deepseek-ai

  # deepseek-news（api-docs.deepseek.com/news）暂下线：Docusaurus 重度 JS 化，
  # 直抓与 Jina 均提不到稳定的文章链接（2026-07 实测）。动态由 deepseek-github 兜底，
  # P10 校准期再攻官网页面。

  # qwen-blog 暂下线：qwenlm.github.io 2025-09 起停更，新站 qwen.ai/blog 是纯 JS
  # 渲染（/blog/rss 返回 SPA HTML，列表页 Jina 也提不到链接，2026-07 实测）。
  # 动态由 qwen-github 兜底；后续可考虑加 HF org 模型发布源补位。

  - id: qwen-github
    org: Qwen
    collector: github
    github_org: QwenLM

  - id: glm-github
    org: GLM
    collector: github
    github_org: zai-org

  # glm-news（z.ai/blog）暂下线：2026-07 实测 404，新入口未找到稳定地址。
  # 动态由 glm-github 兜底，P10 校准期再补。

  # 文章是 /en/<slug> 平铺结构（不在 /blog/ 下），prefix 放宽到 /en/，
  # 混进的少量导航页交给打分节点淘汰
  - id: seed-research
    org: 字节 Seed
    collector: web
    url: https://seed.bytedance.com/en/blog
    link_prefix: https://seed.bytedance.com/en/
    via_jina: true

  - id: kimi-github
    org: Kimi
    collector: github
    github_org: MoonshotAI

  # ============ 论文通道 ============
  # 检索式收紧到岗位面（设计纪要第四节），单次上限 20 防打分池爆炸
  - id: arxiv-papers
    org: arXiv
    collector: arxiv
    query: >-
      cat:cs.CL AND (all:"retrieval-augmented" OR all:"RAG" OR all:"LLM agent"
      OR all:"tool use" OR all:"context compression" OR all:"KV cache")
    max_items: 20
